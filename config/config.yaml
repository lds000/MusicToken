# MusicToken configuration.
# Edit this file to point at real hardware + your music backend on the Pi.

app:
  host: 0.0.0.0
  port: 8080
  log_level: INFO
  # SQLite database file holding chip → action mappings.
  database: config/chips.db

nfc:
  # backend options: mock | pn532_i2c | pn532_spi | mfrc522_spi
  backend: mock
  # Polling interval in seconds when scanning for tags.
  poll_interval: 0.25
  # How long the same tag must be absent before another scan of the same
  # UID will count as a new scan (debounce).
  rescan_cooldown: 1.5
  pn532_i2c:
    bus: 1
    address: 0x24
  pn532_spi:
    cs_pin: D8
  mfrc522_spi:
    bus: 0
    device: 0

printing:
  # Path to the OpenSCAD CLI. Leave blank to auto-discover (PATH +
  # standard install locations + the OPENSCAD env var).
  # Required for the /api/chips/<uid>/stl endpoint and the GUI Print
  # button. Without it, the UI falls back to .scad downloads.
  # Windows install: winget install OpenSCAD.OpenSCAD
  # macOS:           brew install openscad
  # Debian/Ubuntu:   sudo apt install openscad
  openscad_path: ""

player:
  # backend options: mock | spotify | vlc
  backend: mock
  spotify:
    client_id: ""
    client_secret: ""
    redirect_uri: http://localhost:8080/spotify/callback
    # Name of the Spotify Connect device to send playback to.
    device_name: MusicTokenPi
    # Cache file for the OAuth token.
    cache_path: config/.spotify_cache
  vlc:
    # Default volume 0–100 for the local VLC player.
    volume: 80

ai:
  # backend options: mock | openai | anthropic | ollama
  # 'mock' returns deterministic seed suggestions and works without any
  # API keys — great for dev / first boot.
  backend: openai
  # If the primary backend errors (quota, network, malformed JSON), the
  # suggester transparently falls back to the mock provider so the UI
  # never breaks. Set to false to surface errors instead.
  fallback_to_mock: true
  openai:
    api_key: ""        # or set OPENAI_API_KEY in the environment
    model: gpt-4o-mini
  anthropic:
    api_key: ""        # or set ANTHROPIC_API_KEY in the environment
    model: claude-3-5-haiku-latest
  ollama:
    base_url: http://localhost:11434
    model: llama3.2

# Optional shell commands invoked by 'command' chips.
# Map keyed payload values to a shell template.
commands:
  skip:
    description: Skip the current track.
    shell: ""
  clear:
    description: Stop playback / clear the queue.
    shell: ""
  wild:
    description: Pick a random chip from the registry and play it.
    shell: ""
